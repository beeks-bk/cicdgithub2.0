<!DOCTYPE html>
<html>
<head>
    <title>DevOps Pipeline App</title>
    <style>
        body {
            background: #1a1a2e;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 50px;
        }
        h1 { color: #e94560; }
        p { color: #a8a8b3; }
        .badge {
            background: #16213e;
            padding: 10px 20px;
            border-radius: 20px;
            margin: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>🚀 DevOps Pipeline</h1>
    <p>Built with Flask + Docker + Jenkins + K8s</p>
    <div>
        <span class="badge">✅ Flask</span>
        <span class="badge">✅ Docker</span>
        <span class="badge">✅ Jenkins</span>
        <span class="badge">✅ Prometheus</span>
        <span class="badge">✅ Grafana</span>
    </div>
</body>
</html>
